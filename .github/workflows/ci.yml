name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  UV_ENV: ci

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync dependencies (with locking for reproducibility)
        run: |
          # Use --frozen if lockfile exists, otherwise sync with auto-locking
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            echo "No uv.lock found - running sync without --frozen"
            uv sync
          fi

      - name: Check lockfile consistency
        run: |
          uv lock --check || (echo "Lockfile mismatch!" && exit 1)

      - name: Run linters (ruff, black)
        run: |
          uv run ruff check src models
          uv run black --check src models --diff || (echo "Code style issues!" && exit 1)

      - name: Run type checking (mypy)
        run: |
          uv run mypy src models --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          uv run pytest -v --cov=src --cov=models --cov-report=term-missing

  build-and-test-docker:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev container
        run: |
          docker build -f .devcontainer/Dockerfile --tag ophir-ml-dev:latest --load .

      - name: Test imports in container
        run: |
          docker run --rm ophir-ml-dev:latest python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          docker run --rm ophir-ml-dev:latest python -c "import numpy, pandas; print('numpy and pandas import successfully')"

  build-and-test-docker-prod:
    name: Build and Test Production Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (multi-stage)
        run: |
          docker build -f Dockerfile.prod --tag ophir-ml-prod:latest --load .

      - name: Test imports in production container
        run: |
          docker run --rm ophir-ml-prod:latest python -c "import torch; import numpy; print(f'PyTorch {torch.__version__}, NumPy {numpy.__version__}')"
